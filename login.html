<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PESCO HRIS Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-card: #161b22;
            --accent-blue: #2f81f7;
            --text-dim: #8b949e;
            --border-color: #30363d;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #1c2128 0%, #0b0e14 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .login-card {
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            width: 380px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .login-header {
            margin-bottom: 35px;
        }

        .login-header i {
            font-size: 3.5rem;
            color: var(--accent-blue);
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(47, 129, 247, 0.4);
        }

        .login-header h2 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .login-header p {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 14px;
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(47, 129, 247, 0.15);
            background-color: #161b22;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 15px;
        }

        button:hover {
            background-color: #1f6feb;
            box-shadow: 0 4px 15px rgba(47, 129, 247, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.75rem;
            color: var(--text-dim);
            line-height: 1.5;
        }

        /* Responsive tweak */
        @media (max-width: 480px) {
            .login-card { width: 90%; padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-user-shield"></i>
            <h2>PESCO HRIS Portal</h2>
            <p>Strategic Workforce Planning Login</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label for="username">User Identity</label>
                <input type="text" id="username" name="username" placeholder="Username" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="password">Security Key</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit">Access Dashboard</button>
        </form>

        <div class="footer-note">
            &copy; 2026 PESCO IT Department <br>
            Secure internal system. Unauthorized access is prohibited.
        </div>
    </div>

</body>
</html>
